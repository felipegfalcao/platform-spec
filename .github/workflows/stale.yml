name: Mark stale issues and PRs

permissions:
  issues: write
  pull-requests: write

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is activity. If this is still relevant, please comment.
          stale-pr-message: >
            This pull request has been inactive for 30 days. It will be closed in 14
            days unless there is activity. If this is still work in progress, please
            comment or rebase.
          close-issue-message: "Closing due to inactivity. Feel free to reopen if still relevant."
          close-pr-message: "Closing due to inactivity. Feel free to reopen and update."
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 14
          exempt-issue-labels: "pinned,security,roadmap"
          exempt-pr-labels: "pinned,do-not-close"
